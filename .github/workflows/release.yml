name: Release

# Publish to npm via OIDC trusted publishing (no NPM_TOKEN needed). The
# `npm` environment gates the publish behind required approval, and every
# action is pinned to a commit SHA.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/kamishibai
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Guard against tagging a release that doesn't match package.json
      # (v1.2.3 must equal version 1.2.3).
      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pkg=$(node -p "require('./package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          echo "package.json=$pkg  tag=$tag"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $pkg"
            exit 1
          fi

      # No token: npm authenticates through the GitHub OIDC token and
      # generates provenance automatically.
      - name: Publish
        run: npm publish
